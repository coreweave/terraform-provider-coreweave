# Terraform Provider release workflow.
name: Release

# Builds and publishes a GitHub release for a given git tag using GoReleaser.
# Called automatically by release-please after merging a release PR, or
# triggered manually via workflow_dispatch to re-run or recover a release.
on:
  workflow_call:
    inputs:
      git-tag:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      git-tag:
        description: 'Git tag to release (e.g. v0.5.1)'
        required: true
        type: string

# Releases need permissions to read and write the repository contents.
# GitHub considers creating releases and uploading assets as writing contents.
permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          ref: ${{ inputs.git-tag }}
      - uses: ./.github/actions/setup
      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@e89d40939c28e39f97cf32126055eeae86ba74ec # v6.3.0
        id: import_gpg
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}
      - name: Extract release notes
        run: |
          VERSION="${{ inputs.git-tag }}"
          VERSION="${VERSION#v}"
          awk -v ver="$VERSION" '/^## \[/ { if (found) exit; if (index($0, "[" ver) > 0) found=1 } found' CHANGELOG.md > /tmp/release-notes.md
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@e24998b8b67b290c2fa8b7c14fcfa7de2c5c9b8c # v7.1.0
        with:
          args: release --clean --release-notes /tmp/release-notes.md
        env:
          # GitHub sets the GITHUB_TOKEN secret automatically.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}

on:
  workflow_call:
    inputs:
      native:
        type: boolean
        description: 'Whether to run the native OS/ARCH build (true/false)'
        required: false
        default: true
      snapshot:
        type: boolean
        description: 'Whether to run the snapshot (all release OS/Arch combos) build (true/false)'
        required: false
        default: false

jobs:
  native:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: ${{ inputs.native }}
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - uses: ./.github/actions/setup
      - run: go mod download
      - run: go build -v ./...

  snapshot:
    name: Snapshot Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ inputs.snapshot }}
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - uses: ./.github/actions/setup
      - name: Cache Go modules and build cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-goreleaser-snapshot-go-${{ hashFiles('**/go.sum') }}
      - name: Test snapshot build
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          version: latest
          args: release --snapshot --clean --skip sign
